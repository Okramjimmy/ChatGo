server:
  host: "0.0.0.0"
  port: 8081
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

database:
  host: "localhost"
  port: 5432
  name: "chatgo"
  user: "chatgo"
  password: "changeme"
  ssl_mode: "disable"
  max_conns: 25
  min_conns: 5

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "change-this-to-a-long-random-secret-at-least-32-chars"
  access_token_ttl: 15m
  refresh_token_ttl: 168h  # 7 days

file:
  storage_path: "./files"
  max_size_bytes: 104857600  # 100 MB
  allowed_mimes:
    - "image/jpeg"
    - "image/png"
    - "image/gif"
    - "image/webp"
    - "application/pdf"
    - "video/mp4"
    - "audio/mpeg"
    - "application/zip"
    - "text/plain"
  enable_virus_scan: false
  clamav_socket: "/var/run/clamav/clamd.ctl"

log:
  level: "info"
  production: true

cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allowed_headers:
    - "Accept"
    - "Authorization"
    - "Content-Type"
    - "X-Request-ID"

rate_limit:
  requests_per_second: 100
  burst: 200
